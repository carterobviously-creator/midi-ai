<<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wizard Music Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    margin:0;
    font-family:system-ui;
    background:#0a0612;
    color:#f5ecff;
    display:flex;
    height:100vh;
  }
  .sidebar {
    width:220px;
    background:#05030b;
    padding:1rem;
    border-right:1px solid rgba(255,255,255,0.1);
  }
  .main {
    flex:1;
    padding:1.5rem;
    display:flex;
    flex-direction:column;
    gap:1rem;
  }
  textarea, select {
    width:100%;
    background:#151028;
    border:1px solid #3e315f;
    border-radius:8px;
    padding:0.7rem;
    color:#fff;
  }
  button {
    padding:0.6rem 1.2rem;
    border:none;
    border-radius:999px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-primary {
    background:linear-gradient(90deg,#9b6bff,#c9a8ff);
    color:#0b0615;
  }
  .playlist {
    flex:1;
    overflow-y:auto;
    margin-top:1rem;
  }
  .clip {
    background:#151028;
    border:1px solid rgba(255,255,255,0.1);
    padding:0.7rem;
    border-radius:8px;
    margin-bottom:0.5rem;
    display:flex;
    justify-content:space-between;
  }
</style>
</head>
<body>

<div class="sidebar">
  <h2>🧙 Wizard Studio</h2>
  <p>AI MIDI Generator</p>
</div>

<div class="main">
  <h2>Create Track</h2>

  <textarea id="prompt" placeholder="Describe the music..."></textarea>

  <select id="duration">
    <option value="50">50 seconds</option>
    <option value="120">2 minutes</option>
    <option value="180">3 minutes</option>
    <option value="240">4 minutes</option>
    <option value="300">5 minutes</option>
    <option value="360">6 minutes</option>
  </select>

  <button class="btn-primary" id="create">Create</button>

  <h3>Playlist</h3>
  <div class="playlist" id="playlist"></div>
</div>

<script>
// ---------------------------
// LOAD MODEL
// ---------------------------
let MODEL = [];
fetch("model.pt")
  .then(r => r.json())
  .then(j => MODEL = j);

// ---------------------------
// MIDI WRITER (REAL .MID)
// ---------------------------
function writeMIDI(tracks) {
  function varLen(v) {
    let bytes = [];
    do {
      let b = v & 0x7F;
      v >>= 7;
      if (v > 0) b |= 0x80;
      bytes.push(b);
    } while (v > 0);
    return bytes;
  }

  function noteOn(t, pitch) {
    return [...varLen(t), 0x90, pitch, 100];
  }
  function noteOff(t, pitch) {
    return [...varLen(t), 0x80, pitch, 0];
  }

  let header = [
    0x4d,0x54,0x68,0x64,
    0x00,0x00,0x00,0x06,
    0x00,0x01,
    0x00,tracks.length,
    0x01,0xE0
  ];

  let chunks = [];

  tracks.forEach((track, i) => {
    let data = [];
    track.forEach(n => {
      let start = Math.floor(n.time * 480);
      let end = Math.floor((n.time + n.length) * 480);
      data.push(...noteOn(start, n.pitch));
      data.push(...noteOff(end - start, n.pitch));
    });
    data.push(0x00,0xFF,0x2F,0x00);
    let len = data.length;
    chunks.push([
      0x4d,0x54,0x72,0x6b,
      (len>>24)&255,(len>>16)&255,(len>>8)&255,len&255,
      ...data
    ]);
  });

  return new Uint8Array([...header, ...chunks.flat()]);
}

// ---------------------------
// AUDIO PLAYBACK
// ---------------------------
let audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function playTrack(track) {
  let start = audioCtx.currentTime;
  track.forEach(n => {
    let osc = audioCtx.createOscillator();
    let g = audioCtx.createGain();
    osc.frequency.value = 440 * Math.pow(2,(n.pitch-69)/12);
    osc.type = "triangle";
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start(start + n.time);
    osc.stop(start + n.time + n.length);
  });
}

// ---------------------------
// FIND BEST PRESET
// ---------------------------
function matchPreset(prompt) {
  let words = prompt.toLowerCase().split(/\s+/);
  let best = null, bestScore = -1;
  MODEL.forEach(p => {
    let score = 0;
    words.forEach(w => {
      if (p.keyword.toLowerCase().includes(w)) score += 1;
    });
    score += p.rbi * 0.5;
    if (score > bestScore) { bestScore = score; best = p; }
  });
  return best;
}

// ---------------------------
// CREATE CLIP
// ---------------------------
document.getElementById("create").onclick = () => {
  let prompt = document.getElementById("prompt").value;
  let dur = parseInt(document.getElementById("duration").value);

  let preset = matchPreset(prompt);
  if (!preset) return alert("No matching preset!");

  // stretch tracks
  let scale = dur / preset.duration;
  let drums = preset.tracks.drums.map(n => ({...n, time:n.time*scale, length:n.length*scale}));
  let bass  = preset.tracks.bass.map(n => ({...n, time:n.time*scale, length:n.length*scale}));
  let mel   = preset.tracks.melody.map(n => ({...n, time:n.time*scale, length:n.length*scale}));
  let pad   = preset.tracks.pad.map(n => ({...n, time:n.time*scale, length:n.length*scale}));

  let clip = { preset:preset.keyword, duration:dur, drums, bass, mel, pad };

  let div = document.createElement("div");
  div.className = "clip";
  div.innerHTML = `
    <div>
      <b>${preset.keyword}</b><br>
      ${dur}s
    </div>
    <div>
      <button onclick='playTrack(${JSON.stringify(drums)})'>Drums</button>
      <button onclick='playTrack(${JSON.stringify(bass)})'>Bass</button>
      <button onclick='playTrack(${JSON.stringify(mel)})'>Melody</button>
      <button onclick='playTrack(${JSON.stringify(pad)})'>Pad</button>
      <button onclick='exportMIDI(${JSON.stringify(clip)})'>Export</button>
    </div>
  `;
  document.getElementById("playlist").appendChild(div);
};

// ---------------------------
// EXPORT MIDI
// ---------------------------
function exportMIDI(clip) {
  let midi = writeMIDI([
    clip.drums,
    clip.bass,
    clip.mel,
    clip.pad
  ]);
  let blob = new Blob([midi], {type:"audio/midi"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = clip.preset.replace(/\s+/g,"_") + ".mid";
  a.click();
}
</script>
</body>
</html>
