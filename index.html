<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Wizard MIDI Studio</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{
    --bg:#f4f4f7;
    --panel:#ffffff;
    --border:#dcdce5;
    --accent:#3b82f6;
    --accent-soft:#e0edff;
    --text:#111827;
    --muted:#6b7280;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    background:var(--bg);
    color:var(--text);
  }
  .shell{
    max-width:1100px;
    margin:24px auto;
    padding:0 16px 32px;
  }
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    margin-bottom:20px;
  }
  .title-block h1{
    margin:0;
    font-size:24px;
    font-weight:700;
  }
  .title-block p{
    margin:4px 0 0;
    color:var(--muted);
    font-size:14px;
  }
  .badge{
    padding:4px 10px;
    border-radius:999px;
    border:1px solid var(--border);
    background:#fff;
    font-size:12px;
    color:var(--muted);
  }
  .layout{
    display:flex;
    gap:16px;
    align-items:flex-start;
  }
  .card{
    background:var(--panel);
    border-radius:12px;
    border:1px solid var(--border);
    padding:16px;
    box-shadow:0 10px 30px rgba(15,23,42,0.06);
  }
  .create-card{
    flex:1.4;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .playlist-card{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:8px;
    max-height:520px;
  }
  .card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:4px;
  }
  .card-title{
    font-weight:600;
    font-size:15px;
  }
  .card-sub{
    font-size:13px;
    color:var(--muted);
  }
  label{
    font-size:13px;
    color:var(--muted);
    display:block;
    margin-bottom:4px;
  }
  textarea,select{
    width:100%;
    border-radius:8px;
    border:1px solid var(--border);
    padding:8px 10px;
    font-size:14px;
    font-family:inherit;
    resize:vertical;
  }
  textarea:focus,select:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent-soft);
  }
  textarea{min-height:110px;}
  .row{
    display:flex;
    gap:10px;
    align-items:flex-start;
  }
  .grow{flex:1;}
  button{
    border:none;
    border-radius:999px;
    padding:8px 14px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .btn-primary{
    background:var(--accent);
    color:#fff;
  }
  .btn-secondary{
    background:#fff;
    color:var(--text);
    border:1px solid var(--border);
  }
  .btn-primary:hover{filter:brightness(1.05);}
  .btn-secondary:hover{background:#f9fafb;}
  .small{
    font-size:12px;
    color:var(--muted);
  }
  .log{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:11px;
    background:#f9fafb;
    border-radius:8px;
    padding:8px;
    border:1px solid var(--border);
    max-height:110px;
    overflow:auto;
  }
  .playlist-list{
    flex:1;
    overflow:auto;
    margin-top:4px;
  }
  .clip{
    border-radius:8px;
    border:1px solid var(--border);
    padding:8px 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:6px;
    background:#fff;
  }
  .clip-main{
    max-width:60%;
  }
  .clip-title{
    font-size:13px;
    font-weight:600;
  }
  .clip-meta{
    font-size:12px;
    color:var(--muted);
  }
  .clip-actions{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  @media(max-width:900px){
    .layout{flex-direction:column;}
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="title-block">
      <h1>Wizard MIDI Studio</h1>
      <p>Text → multitrack MIDI using Magenta.js. Clean UI, real export.</p>
    </div>
    <div class="badge" id="modelStatus">Loading Magenta model…</div>
  </header>

  <div class="layout">
    <section class="card create-card">
      <div class="card-header">
        <div>
          <div class="card-title">Create track</div>
          <div class="card-sub">Describe the vibe, choose duration, generate.</div>
        </div>
        <div class="small" id="statusText">Ready</div>
      </div>

      <div>
        <label for="prompt">Prompt</label>
        <textarea id="prompt" placeholder="e.g. epic wizard theme with drums and soaring melody"></textarea>
      </div>

      <div class="row">
        <div class="grow">
          <label for="duration">Duration</label>
          <select id="duration">
            <option value="50">50 seconds</option>
            <option value="120">2 minutes</option>
            <option value="180">3 minutes</option>
            <option value="240">4 minutes</option>
            <option value="300">5 minutes</option>
            <option value="360">6 minutes</option>
          </select>
        </div>
        <div class="grow">
          <label for="temperature">Variation</label>
          <select id="temperature">
            <option value="0.8">Stable</option>
            <option value="1.0" selected>Balanced</option>
            <option value="1.3">Wild</option>
          </select>
        </div>
      </div>

      <div class="row" style="margin-top:8px;">
        <button class="btn-primary" id="generateBtn">Generate</button>
        <button class="btn-secondary" id="playAllBtn">Play all</button>
        <button class="btn-secondary" id="stopBtn">Stop</button>
        <button class="btn-secondary" id="clearBtn">Clear</button>
      </div>

      <div class="row" style="justify-content:space-between;margin-top:4px;">
        <div class="small">Playlist: <span id="clipCount">0</span></div>
        <div class="small">Export: standard .mid (Magenta sequence)</div>
      </div>

      <div class="log" id="log">Studio ready.</div>
    </section>

    <section class="card playlist-card">
      <div class="card-header">
        <div>
          <div class="card-title">Playlist</div>
          <div class="card-sub">Each clip is a generated MIDI sequence.</div>
        </div>
      </div>
      <div class="playlist-list" id="playlist"></div>
    </section>
  </div>
</div>

<!-- Magenta.js -->
<script src="https://unpkg.com/@magenta/music@1.23.1"></script>
<script>
let rnn;
let rnnReady = false;
let player;
let playlist = [];

const modelStatusEl = document.getElementById('modelStatus');
const statusTextEl = document.getElementById('statusText');
const logEl = document.getElementById('log');

function log(msg){
  const t = new Date().toLocaleTimeString();
  logEl.textContent = `[${t}] ${msg}\n` + logEl.textContent;
}

async function initMagenta(){
  try{
    rnn = new mm.MusicRNN(
      'https://storage.googleapis.com/magentadata/js/checkpoints/music_rnn/basic_rnn'
    );
    await rnn.initialize();
    player = new mm.Player();
    rnnReady = true;
    modelStatusEl.textContent = 'Model: basic_rnn loaded';
    log('Magenta MusicRNN loaded.');
  }catch(e){
    modelStatusEl.textContent = 'Failed to load model';
    log('Error loading Magenta model: ' + e.message);
  }
}
initMagenta();

/* prompt → deterministic seed melody */
function hashString(s){
  let h = 0;
  for(let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}
function seedFromPrompt(prompt){
  const basePitch = 60 + (hashString(prompt) % 12); // C4-ish
  const steps = [0,2,4,7,9];
  const notes = [];
  for(let i=0;i<8;i++){
    const step = steps[(hashString(prompt + i) + i) % steps.length];
    notes.push({
      pitch: basePitch + step,
      startTime: i * 0.5,
      endTime: i * 0.5 + 0.45
    });
  }
  return {
    notes,
    totalTime: notes[notes.length-1].endTime
  };
}

/* generate sequence with RNN */
async function generateSequence(prompt, durationSec, temperature){
  if(!rnnReady) throw new Error('Model not ready');
  const seed = seedFromPrompt(prompt || 'wizard');
  const stepsPerSecond = 4; // 16th notes
  const totalSteps = Math.max(16, Math.floor(durationSec * stepsPerSecond));
  const continuation = await rnn.continueSequence(
    seed,
    totalSteps,
    temperature
  );
  // shift continuation to start at 0
  const seq = mm.sequences.concatenate([seed, continuation]);
  // trim to requested duration
  const maxTime = durationSec;
  seq.notes = seq.notes.filter(n => n.startTime < maxTime);
  seq.totalTime = Math.min(seq.totalTime, maxTime);
  return seq;
}

/* playlist UI */
function renderPlaylist(){
  const el = document.getElementById('playlist');
  el.innerHTML = '';
  document.getElementById('clipCount').textContent = playlist.length;
  playlist.forEach((clip, idx)=>{
    const div = document.createElement('div');
    div.className = 'clip';
    const main = document.createElement('div');
    main.className = 'clip-main';
    main.innerHTML = `
      <div class="clip-title">${clip.label}</div>
      <div class="clip-meta">${clip.duration}s · ${clip.notesCount} notes</div>
    `;
    const actions = document.createElement('div');
    actions.className = 'clip-actions';

    const playBtn = document.createElement('button');
    playBtn.className = 'btn-secondary';
    playBtn.textContent = 'Play';
    playBtn.onclick = () => playClip(clip);

    const exportBtn = document.createElement('button');
    exportBtn.className = 'btn-secondary';
    exportBtn.textContent = 'Export .mid';
    exportBtn.onclick = () => exportClip(clip);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-secondary';
    delBtn.textContent = '✕';
    delBtn.onclick = () => { playlist.splice(idx,1); renderPlaylist(); };

    actions.appendChild(playBtn);
    actions.appendChild(exportBtn);
    actions.appendChild(delBtn);

    div.appendChild(main);
    div.appendChild(actions);
    el.appendChild(div);
  });
}

/* playback */
function stopAll(){
  if(player) player.stop();
}
function playClip(clip){
  if(!player) return;
  stopAll();
  player.start(clip.sequence);
  log('Playing: ' + clip.label);
}

/* export */
function exportClip(clip){
  const bytes = mm.sequenceProtoToMidi(clip.sequence);
  const blob = new Blob([bytes], {type:'audio/midi'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = clip.label.replace(/\s+/g,'_') + '.mid';
  a.click();
  log('Exported .mid: ' + a.download);
}

/* generate button */
document.getElementById('generateBtn').onclick = async () => {
  const prompt = document.getElementById('prompt').value || 'wizard theme';
  const duration = parseInt(document.getElementById('duration').value,10) || 60;
  const temperature = parseFloat(document.getElementById('temperature').value || '1.0');

  if(!rnnReady){
    statusTextEl.textContent = 'Model not ready yet';
    log('Model not ready yet.');
    return;
  }

  statusTextEl.textContent = 'Generating…';
  log('Generating sequence for "'+prompt+'" ('+duration+'s)…');

  try{
    const seq = await generateSequence(prompt, duration, temperature);
    const clip = {
      label: prompt.trim() || 'untitled',
      duration: duration,
      notesCount: seq.notes.length,
      sequence: seq
    };
    playlist.push(clip);
    renderPlaylist();
    statusTextEl.textContent = 'Generated';
    log('Generated clip: '+clip.label+' with '+clip.notesCount+' notes.');
  }catch(e){
    statusTextEl.textContent = 'Error';
    log('Generation error: ' + e.message);
  }
};

/* play all */
document.getElementById('playAllBtn').onclick = async () => {
  if(!playlist.length || !player) { log('Playlist empty.'); return; }
  stopAll();
  // concatenate all sequences
  let offset = 0;
  const merged = {notes:[], totalTime:0};
  playlist.forEach(clip=>{
    clip.sequence.notes.forEach(n=>{
      merged.notes.push({
        pitch:n.pitch,
        startTime:n.startTime + offset,
        endTime:n.endTime + offset,
        velocity:n.velocity
      });
    });
    offset += clip.sequence.totalTime;
  });
  merged.totalTime = offset;
  player.start(merged);
  log('Playing all clips in sequence.');
};

/* stop / clear */
document.getElementById('stopBtn').onclick = () => {
  stopAll();
  log('Stopped playback.');
};
document.getElementById('clearBtn').onclick = () => {
  stopAll();
  playlist = [];
  renderPlaylist();
  log('Cleared playlist.');
};

/* init */
renderPlaylist();
</script>
</body>
</html>
