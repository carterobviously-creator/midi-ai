<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wizard Music Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #24113f, #05030a 70%);
    color: #f5ecff;
  }
  .app {
    display: grid;
    grid-template-columns: 230px minmax(0, 1.5fr) minmax(0, 1.2fr);
    height: 100vh;
  }
  .sidebar {
    background: #05030b;
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 1rem;
  }
  .logo { font-weight: 700; margin-bottom: 1rem; }
  .main, .right {
    padding: 1rem 1.4rem;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }
  .main {
    border-right: 1px solid rgba(255,255,255,0.08);
    background: radial-gradient(circle at top, #1a1230, #0b0718);
  }
  .right {
    background: radial-gradient(circle at top, #18122b, #0b0718);
  }
  h2 { margin: 0 0 0.3rem; }
  label { font-size: 0.85rem; opacity: 0.85; }
  textarea, select {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border-radius: 8px;
    border: 1px solid #3e315f;
    color: #f5ecff;
    padding: 0.55rem 0.7rem;
    font-size: 0.9rem;
    box-sizing: border-box;
  }
  textarea { min-height: 110px; resize: vertical; }
  button {
    border: none;
    border-radius: 999px;
    padding: 0.55rem 1.2rem;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(90deg, #9b6bff, #c9a8ff);
    color: #0b0615;
  }
  .btn-ghost {
    background: rgba(255,255,255,0.05);
    color: #f5ecff;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .row { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
  .status { font-size: 0.8rem; opacity: 0.85; }
  .playlist { flex: 1; overflow-y: auto; margin-top: 0.5rem; }
  .clip {
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 0.55rem 0.7rem;
    margin-bottom: 0.45rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
  }
  .clip-main { max-width: 70%; }
  .clip-title { font-weight: 600; }
  .clip-meta { opacity: 0.8; font-size: 0.8rem; }
  .log {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 0.8rem;
    background: rgba(0,0,0,0.5);
    border-radius: 8px;
    padding: 0.5rem 0.6rem;
    max-height: 120px;
    overflow-y: auto;
    opacity: 0.9;
  }
  @media (max-width: 900px) {
    .app { grid-template-columns: minmax(0, 1fr); grid-template-rows: auto auto auto; height: auto; }
    .sidebar { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .main { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">🧙 wizard studio</div>
    <div style="font-size:0.85rem;opacity:0.85;">
      Uses model.pt presets<br>
      Long MIDI‑style spells
    </div>
  </aside>

  <main class="main">
    <h2>Create spell track</h2>
    <div>
      <label for="promptInput">Prompt / description</label>
      <textarea id="promptInput"
        placeholder="Example: epic wizard theme with glowing runes and slow build..."></textarea>
    </div>

    <div>
      <label for="durationSelect">Duration</label>
      <select id="durationSelect">
        <option value="50">50 seconds</option>
        <option value="120">2 minutes</option>
        <option value="180">3 minutes</option>
        <option value="240">4 minutes</option>
        <option value="300">5 minutes</option>
        <option value="360">6 minutes</option>
      </select>
    </div>

    <div class="row">
      <button class="btn-primary" id="createBtn">Create</button>
      <span class="status" id="statusText">Loading model.pt…</span>
    </div>

    <div class="log" id="logBox">Log will appear here…</div>
  </main>

  <section class="right">
    <h2>Playlist</h2>
    <div class="row">
      <button class="btn-ghost" id="playAllBtn">Play all</button>
      <button class="btn-ghost" id="clearBtn">Clear</button>
    </div>
    <div class="status" id="countText">0 clips</div>
    <div class="playlist" id="playlist"></div>
  </section>
</div>

<script>
let MODEL = [];
let modelLoaded = false;
let playlist = [];
let clipId = 1;
let audioCtx = null;
let activeOscs = [];

function log(msg) {
  const box = document.getElementById("logBox");
  const t = new Date().toLocaleTimeString();
  box.textContent = `[${t}] ${msg}\n` + box.textContent;
}

async function loadModel() {
  const status = document.getElementById("statusText");
  try {
    const res = await fetch("model.pt", { cache: "no-store" });
    const txt = await res.text();
    MODEL = JSON.parse(txt);
    if (!Array.isArray(MODEL)) throw new Error("model is not array");
    modelLoaded = true;
    status.textContent = "Model loaded: " + MODEL.length + " presets.";
    log("Loaded model.pt");
  } catch (e) {
    status.textContent = "Failed to load model.pt";
    log("Error loading model: " + e.message);
  }
}
loadModel();

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function stopAll() {
  activeOscs.forEach(o => { try { o.stop(); } catch {} });
  activeOscs = [];
}

function scoreMatch(input, keyword, rbi) {
  const a = input.toLowerCase().split(/\s+/).filter(Boolean);
  const b = keyword.toLowerCase().split(/\s+/).filter(Boolean);
  if (!a.length || !b.length) return 0;
  let overlap = 0;
  for (const t of a) if (b.includes(t)) overlap++;
  const base = overlap / Math.max(a.length, b.length);
  const bonus = (typeof rbi === "number" ? rbi : 0) * 0.2;
  return base + bonus;
}

function findBestPreset(prompt) {
  if (!modelLoaded || !MODEL.length) return null;
  const text = prompt.trim();
  if (!text) return null;
  let best = null;
  let bestScore = -Infinity;
  for (const entry of MODEL) {
    const s = scoreMatch(text, entry.keyword || "", entry.rbi);
    if (s > bestScore) {
      bestScore = s;
      best = { ...entry, score: s };
    }
  }
  if (!best || bestScore < 0.1) return null;
  return best;
}

// stretch notes to target duration
function stretchNotes(notes, baseDuration, targetDuration) {
  if (!baseDuration || baseDuration <= 0) return notes;
  const scale = targetDuration / baseDuration;
  return notes.map(n => ({
    pitch: n.pitch,
    time: n.time * scale,
    length: n.length * scale
  }));
}

function updateCount() {
  const t = document.getElementById("countText");
  t.textContent = playlist.length + (playlist.length === 1 ? " clip" : " clips");
}

function renderPlaylist() {
  const container = document.getElementById("playlist");
  container.innerHTML = "";
  playlist.forEach((clip, idx) => {
    const el = document.createElement("div");
    el.className = "clip";

    const main = document.createElement("div");
    main.className = "clip-main";
    const title = document.createElement("div");
    title.className = "clip-title";
    title.textContent = clip.keyword + " · " + clip.duration + "s";
    const meta = document.createElement("div");
    meta.className = "clip-meta";
    meta.textContent = "Score " + clip.score.toFixed(3) + " · RBI " + clip.rbi;
    main.appendChild(title);
    main.appendChild(meta);

    const actions = document.createElement("div");
    const playBtn = document.createElement("button");
    playBtn.className = "btn-ghost";
    playBtn.textContent = "Play";
    playBtn.onclick = () => playClip(clip);
    const exportBtn = document.createElement("button");
    exportBtn.className = "btn-ghost";
    exportBtn.textContent = "Export";
    exportBtn.onclick = () => exportClip(clip);
    const delBtn = document.createElement("button");
    delBtn.className = "btn-ghost";
    delBtn.textContent = "Delete";
    delBtn.onclick = () => {
      playlist.splice(idx, 1);
      renderPlaylist();
      updateCount();
    };
    actions.appendChild(playBtn);
    actions.appendChild(exportBtn);
    actions.appendChild(delBtn);

    el.appendChild(main);
    el.appendChild(actions);
    container.appendChild(el);
  });
}

function playNotes(notes) {
  ensureAudio();
  stopAll();
  const start = audioCtx.currentTime;
  notes.forEach(n => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const freq = 440 * Math.pow(2, (n.pitch - 69) / 12);
    osc.type = "sine";
    osc.frequency.value = freq;
    const t = start + n.time;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.4, t + 0.02);
    gain.gain.linearRampToValueAtTime(0, t + n.length);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + n.length + 0.05);
    activeOscs.push(osc);
  });
}

function playClip(clip) {
  log("Playing clip: " + clip.keyword);
  playNotes(clip.notes);
}

function playAll() {
  if (!playlist.length) {
    log("No clips to play.");
    return;
  }
  ensureAudio();
  stopAll();
  let offset = 0;
  playlist.forEach(clip => {
    const baseStart = audioCtx.currentTime + offset;
    clip.notes.forEach(n => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const freq = 440 * Math.pow(2, (n.pitch - 69) / 12);
      osc.type = "sine";
      osc.frequency.value = freq;
      const t = baseStart + n.time;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.4, t + 0.02);
      gain.gain.linearRampToValueAtTime(0, t + n.length);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + n.length + 0.05);
      activeOscs.push(osc);
    });
    offset += clip.duration;
  });
  log("Playing all clips in sequence.");
}

function exportClip(clip) {
  const data = {
    keyword: clip.keyword,
    rbi: clip.rbi,
    duration: clip.duration,
    notes: clip.notes
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = clip.keyword.replace(/\s+/g, "_") + "_" + clip.duration + "s.json";
  a.click();
  log("Exported clip: " + clip.keyword);
}

function createFromPrompt() {
  const prompt = document.getElementById("promptInput").value;
  const duration = parseInt(document.getElementById("durationSelect").value, 10);
  if (!prompt.trim()) {
    document.getElementById("statusText").textContent = "Enter a prompt first.";
    return;
  }
  const best = findBestPreset(prompt);
  if (!best) {
    document.getElementById("statusText").textContent = "No strong preset match.";
    log("No strong match for prompt.");
    return;
  }
  const stretched = stretchNotes(best.notes || [], best.duration || 60, duration);
  const clip = {
    id: clipId++,
    keyword: best.keyword,
    rbi: best.rbi,
    score: best.score,
    duration,
    notes: stretched
  };
  playlist.push(clip);
  renderPlaylist();
  updateCount();
  document.getElementById("statusText").textContent =
    "Created clip using preset: " + best.keyword;
  log("Created clip from preset: " + best.keyword + " (score " + best.score.toFixed(3) + ")");
}

document.getElementById("createBtn").onclick = createFromPrompt;
document.getElementById("playAllBtn").onclick = playAll;
document.getElementById("clearBtn").onclick = () => {
  stopAll();
  playlist = [];
  renderPlaylist();
  updateCount();
  log("Cleared playlist.");
};
</script>
</body>
</html>
