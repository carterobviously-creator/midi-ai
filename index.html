<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wizard Studio v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; font-family:system-ui; background:#0a0612; color:#f5ecff; }
  .app { display:grid; grid-template-columns:220px 1fr; height:100vh; }
  .sidebar { background:#05030b; padding:1rem; border-right:1px solid rgba(255,255,255,0.08); }
  .main { padding:1rem 1.5rem; display:flex; flex-direction:column; gap:1rem; }
  input, textarea, select { width:100%; background:#151028; color:#f5ecff; border:1px solid #3e315f; border-radius:8px; padding:0.6rem; }
  button { border:none; border-radius:999px; padding:0.6rem 1.2rem; font-weight:600; cursor:pointer; }
  .btn-primary { background:linear-gradient(90deg,#9b6bff,#c9a8ff); color:#0b0615; }
  .playlist { flex:1; overflow-y:auto; }
  .clip { background:#151028; border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:0.6rem; margin-bottom:0.5rem; display:flex; justify-content:space-between; align-items:center; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h2>🧙 Wizard Studio</h2>
    <p>Create magical MIDI spells</p>
  </aside>

  <main class="main">
    <h3>Create Spell Track</h3>
    <input id="titleInput" placeholder="Spell title">
    <input id="styleInput" placeholder="Style or vibe (e.g. ethereal synth)">
    <textarea id="promptInput" placeholder="Describe your spell..."></textarea>

    <label>Duration</label>
    <select id="durationSelect">
      <option value="50">50 seconds</option>
      <option value="120">2 minutes</option>
      <option value="180">3 minutes</option>
      <option value="240">4 minutes</option>
      <option value="300">5 minutes</option>
      <option value="360">6 minutes</option>
    </select>

    <div style="display:flex;gap:0.5rem;">
      <button class="btn-primary" id="createBtn">Create</button>
      <button class="btn-primary" id="exportBtn">Export</button>
    </div>

    <div class="playlist" id="playlist"></div>
  </main>
</div>

<script>
let playlist = [];
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function playNotes(notes, duration) {
  ensureAudio();
  const start = audioCtx.currentTime;
  const scale = duration / 60; // scale timing to chosen duration
  notes.forEach(n => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const freq = 440 * Math.pow(2, (n.pitch - 69) / 12);
    osc.type = "sine";
    osc.frequency.value = freq;
    const t = start + n.time * scale;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.4, t + 0.02);
    gain.gain.linearRampToValueAtTime(0, t + n.length * scale);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + n.length * scale);
  });
}

function createClip() {
  const title = document.getElementById("titleInput").value || "Untitled";
  const style = document.getElementById("styleInput").value || "Unknown";
  const prompt = document.getElementById("promptInput").value || "No description";
  const duration = parseInt(document.getElementById("durationSelect").value);
  const notes = generateNotes(duration);
  const clip = { title, style, prompt, duration, notes };
  playlist.push(clip);
  renderPlaylist();
}

function generateNotes(duration) {
  const notes = [];
  const count = Math.floor(duration / 2);
  for (let i = 0; i < count; i++) {
    notes.push({
      pitch: 60 + (i % 12),
      time: i * 0.5,
      length: 0.4
    });
  }
  return notes;
}

function renderPlaylist() {
  const container = document.getElementById("playlist");
  container.innerHTML = "";
  playlist.forEach((clip, idx) => {
    const el = document.createElement("div");
    el.className = "clip";
    el.innerHTML = `<div><b>${clip.title}</b><br>${clip.style} · ${clip.duration}s</div>
                    <div>
                      <button onclick="playNotes(playlist[${idx}].notes, playlist[${idx}].duration)">Play</button>
                      <button onclick="playlist.splice(${idx},1);renderPlaylist()">Delete</button>
                    </div>`;
    container.appendChild(el);
  });
}

function exportClip() {
  if (!playlist.length) return alert("No clips to export!");
  const clip = playlist[playlist.length - 1];
  const blob = new Blob([JSON.stringify(clip, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = clip.title.replace(/\s+/g, "_") + ".mid.json";
  a.click();
}

document.getElementById("createBtn").onclick = createClip;
document.getElementById("exportBtn").onclick = exportClip;
</script>
</body>
</html>
